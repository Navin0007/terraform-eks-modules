name: Terraform

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/.terraform.lock.hcl"
      - ".terraform-version"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/**"
      - "modules/eks-validation/**"
      - "docs/EKS-POST-APPLY-VALIDATION.md"
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/.terraform.lock.hcl"
      - ".terraform-version"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
      - ".github/scripts/**"
      - "modules/eks-validation/**"
      - "docs/EKS-POST-APPLY-VALIDATION.md"
  workflow_dispatch:
    inputs:
      operation:
        description: "Terraform operation against AWS (requires OIDC)"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy
      confirm_destroy:
        description: "Type destroy to confirm (required when operation is destroy)"
        type: string
        default: ""
      target:
        description: "Stack to run (all runs bootstrap → policies → dev in order)"
        type: choice
        default: all
        options:
          - all
          - global/bootstrap
          - global/policies
          - environments/dev
      dev_eks_phase:
        description: "Dev EKS stage — use addons-only to destroy/recreate post-node add-ons without touching VPC/cluster"
        type: choice
        default: none
        options:
          - none
          - cluster
          - irsa
          - pre_node_addons
          - nodes
          - addons
          - addons-only
          - all

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"
  TF_PROJECT_NAME: ${{ vars.TF_PROJECT_NAME }}
  TF_ENVIRONMENT: ${{ vars.TF_ENVIRONMENT }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_KMS_KEY_ID: ${{ vars.TF_STATE_KMS_KEY_ID }}
  TF_STATE_DYNAMODB_TABLE: ${{ vars.TF_STATE_DYNAMODB_TABLE }}
  TF_STATE_KMS_KEY_ARN: ${{ vars.TF_STATE_KMS_KEY_ARN }}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive

  validate:
    name: Validate (${{ matrix.working_directory }})
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working_directory:
          - global/bootstrap
          - global/policies
          - environments/dev
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  tflint:
    name: TFLint
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.54.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint -f compact

  aws:
    name: >-
      ${{ github.event.inputs.operation == 'apply' && 'Apply'
          || (github.event.inputs.operation == 'destroy' && 'Destroy' || 'Plan') }}
      (${{ github.event.inputs.target }})
    needs: validate
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ github.event.inputs.operation == 'destroy' && 120 || 150 }}
    environment: ${{ vars.TF_ENVIRONMENT || 'dev' }}
    concurrency:
      group: terraform-${{ github.event.inputs.target }}-${{ vars.TF_ENVIRONMENT }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 10800

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Load Terraform helpers
        run: chmod +x .github/scripts/terraform-common.sh

      - name: Set dev EKS phase variables
        if: inputs.target == 'all' || inputs.target == 'environments/dev'
        run: |
          source .github/scripts/terraform-common.sh
          apply_dev_eks_phase_from_input "${{ inputs.dev_eks_phase }}"
          echo "DEV_EKS_PHASE=${{ inputs.dev_eks_phase }}" >> "$GITHUB_ENV"
          {
            echo "TF_VAR_enable_eks=${TF_VAR_enable_eks}"
            echo "TF_VAR_enable_eks_cluster=${TF_VAR_enable_eks_cluster}"
            echo "TF_VAR_enable_eks_nodes=${TF_VAR_enable_eks_nodes}"
            echo "TF_VAR_enable_irsa=${TF_VAR_enable_irsa}"
            echo "TF_VAR_enable_addons=${TF_VAR_enable_addons}"
          } >> "$GITHUB_ENV"

      - name: Confirm destroy
        if: inputs.operation == 'destroy'
        run: |
          if [ "${{ inputs.confirm_destroy }}" != "destroy" ]; then
            echo "::error::Destroy requires typing destroy in the confirm_destroy field."
            exit 1
          fi
          echo "Destroy confirmed."

      - name: Repair remote state (destroy)
        if: inputs.operation == 'destroy'
        run: |
          source .github/scripts/terraform-common.sh
          export_bootstrap_backend_env global/bootstrap "${{ inputs.operation }}" "${{ inputs.target }}"
          repair_remote_state_backend_for_destroy

      - name: Bootstrap init and import
        if: >-
          inputs.target == 'all' || inputs.target == 'global/bootstrap'
          || inputs.target == 'global/policies' || inputs.target == 'environments/dev'
        run: |
          source .github/scripts/terraform-common.sh
          bootstrap_reconcile_orphan_kms || true
          if [ "${{ inputs.target }}" = "all" ] || [ "${{ inputs.target }}" = "global/bootstrap" ]; then
            bootstrap_prepare_apply
          fi
          bootstrap_precheck_report
          bootstrap_init global/bootstrap
          if [ "${{ inputs.target }}" = "all" ] || [ "${{ inputs.target }}" = "global/bootstrap" ]; then
            import_existing_bootstrap_resources global/bootstrap
          fi

      - name: Bootstrap plan
        if: inputs.operation == 'plan' && (inputs.target == 'all' || inputs.target == 'global/bootstrap')
        run: |
          source .github/scripts/terraform-common.sh
          bootstrap_run_plan global/bootstrap

      - name: Bootstrap apply
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'global/bootstrap')
        run: |
          source .github/scripts/terraform-common.sh
          bootstrap_run_apply global/bootstrap

      - name: Migrate bootstrap state to S3
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'global/bootstrap')
        run: |
          source .github/scripts/terraform-common.sh
          maybe_migrate_bootstrap_state global/bootstrap

      - name: Print bootstrap repository variables
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'global/bootstrap')
        working-directory: global/bootstrap
        run: |
          echo "Save these as GitHub repository variables for plan-only workflows:"
          echo "TF_STATE_BUCKET=$(terraform output -raw state_bucket_name)"
          echo "TF_STATE_KMS_KEY_ID=$(terraform output -raw kms_key_id)"
          echo "TF_STATE_DYNAMODB_TABLE=$(terraform output -raw dynamodb_table_name)"
          echo "TF_STATE_KMS_KEY_ARN=$(terraform output -raw kms_key_arn)"

      - name: Export bootstrap outputs
        if: inputs.target == 'all' || inputs.target == 'global/policies' || inputs.target == 'environments/dev'
        run: |
          source .github/scripts/terraform-common.sh
          export_bootstrap_backend_env global/bootstrap "${{ inputs.operation }}" "${{ inputs.target }}"

      - name: Policies init
        if: inputs.target == 'all' || inputs.target == 'global/policies'
        run: |
          source .github/scripts/terraform-common.sh
          tf_init_s3_backend global/policies global/policies/terraform.tfstate

      - name: Policies plan
        if: inputs.operation == 'plan' && (inputs.target == 'all' || inputs.target == 'global/policies')
        working-directory: global/policies
        run: |
          source ../../.github/scripts/terraform-common.sh
          mapfile -t var_args < <(tf_var_args)
          terraform plan -input=false -no-color "${var_args[@]}"

      - name: Policies apply
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'global/policies')
        working-directory: global/policies
        run: |
          source ../../.github/scripts/terraform-common.sh
          mapfile -t var_args < <(tf_var_args)
          terraform apply -input=false -auto-approve -no-color "${var_args[@]}"

      - name: Dev init
        if: inputs.target == 'all' || inputs.target == 'environments/dev'
        run: |
          source .github/scripts/terraform-common.sh
          tf_init_s3_backend environments/dev dev/terraform.tfstate

      - name: Import existing dev resources
        if: >-
          contains(fromJSON('["cluster","nodes","irsa","addons","all"]'), inputs.dev_eks_phase)
          && inputs.operation != 'destroy'
          && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          import_existing_dev_resources environments/dev

      # TODO: Remove after my-project-dev-eks is in Terraform state (recovery from partial apply).
      - name: Import EKS cluster into state (recovery)
        if: >-
          contains(fromJSON('["cluster","nodes","irsa","addons","all"]'), inputs.dev_eks_phase)
          && inputs.operation != 'destroy'
          && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          import_eks_cluster_recovery environments/dev

      - name: Upgrade EKS authentication mode
        if: >-
          contains(fromJSON('["cluster","nodes","irsa","addons","all"]'), inputs.dev_eks_phase)
          && inputs.operation != 'destroy'
          && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          upgrade_eks_authentication_mode_if_needed

      - name: Dev destroy prep
        if: inputs.operation == 'destroy' && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          dev_stack_destroy_prep

      - name: Dev destroy
        if: inputs.operation == 'destroy' && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          if [ "${DEV_EKS_PHASE:-}" = "addons-only" ]; then
            dev_destroy_addons_only environments/dev
          else
            pushd environments/dev >/dev/null
            mapfile -t var_args < <(tf_var_args)
            mapfile -t dev_args < <(tf_dev_extra_var_args)
            terraform destroy -input=false -auto-approve -no-color "${var_args[@]}" "${dev_args[@]}"
            popd >/dev/null
          fi

      - name: Dev plan
        if: inputs.operation == 'plan' && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          dev_stack_prepare environments/dev
          pushd environments/dev >/dev/null
          mapfile -t var_args < <(tf_var_args)
          mapfile -t dev_args < <(tf_dev_extra_var_args)
          terraform plan -input=false -no-color "${var_args[@]}" "${dev_args[@]}"
          popd >/dev/null

      - name: Refresh AWS credentials before dev apply
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'environments/dev')
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-duration-seconds: 10800

      - name: Dev apply
        if: inputs.operation == 'apply' && (inputs.target == 'all' || inputs.target == 'environments/dev')
        run: |
          source .github/scripts/terraform-common.sh
          recover_dev_cluster_if_api_mode environments/dev
          dev_stack_prepare environments/dev
          dev_import_diagnostics environments/dev
          import_eks_node_access_to_state environments/dev
          pushd environments/dev >/dev/null
          mapfile -t var_args < <(tf_var_args)
          mapfile -t dev_args < <(tf_dev_extra_var_args)
          if ! terraform apply -input=false -auto-approve -no-color "${var_args[@]}" "${dev_args[@]}"; then
            diagnose_node_join_failure
            exit 1
          fi
          dev_stack_apply_summary environments/dev
          run_eks_post_apply_validation environments/dev
          popd >/dev/null

      - name: Policies destroy
        if: inputs.operation == 'destroy' && (inputs.target == 'all' || inputs.target == 'global/policies')
        working-directory: global/policies
        run: |
          source ../../.github/scripts/terraform-common.sh
          mapfile -t var_args < <(tf_var_args)
          terraform destroy -input=false -auto-approve -no-color "${var_args[@]}"

      - name: Remove dev/policies state from S3
        if: inputs.operation == 'destroy' && inputs.target == 'all'
        run: |
          source .github/scripts/terraform-common.sh
          remove_downstream_remote_state_keys

      - name: Bootstrap finish teardown
        if: inputs.operation == 'destroy' && (inputs.target == 'all' || inputs.target == 'global/bootstrap')
        run: |
          source .github/scripts/terraform-common.sh
          bootstrap_finish_teardown global/bootstrap
