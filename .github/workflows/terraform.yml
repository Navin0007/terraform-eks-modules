name: Terraform

on:
  pull_request:
    paths:
      - "**/*.tf"
      - "**/.terraform.lock.hcl"
      - ".terraform-version"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
  push:
    branches: [main]
    paths:
      - "**/*.tf"
      - "**/.terraform.lock.hcl"
      - ".terraform-version"
      - ".tflint.hcl"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      working_directory:
        description: "Terraform root module to plan"
        type: choice
        default: global/bootstrap
        options:
          - global/bootstrap
          - global/policies
      run_plan:
        description: "Run terraform plan against AWS (requires OIDC)"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

env:
  TF_IN_AUTOMATION: "true"

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Terraform Format
        run: terraform fmt -check -recursive

  validate:
    name: Validate (${{ matrix.working_directory }})
    needs: fmt
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        working_directory:
          - global/bootstrap
          - global/policies
    defaults:
      run:
        working-directory: ${{ matrix.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

  tflint:
    name: TFLint
    needs: fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.54.0

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint -f compact

  plan:
    name: Plan (${{ github.event.inputs.working_directory }})
    needs: validate
    if: github.event_name == 'workflow_dispatch' && inputs.run_plan
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.working_directory == 'global/policies' && 'policies' || 'bootstrap' }}
    defaults:
      run:
        working-directory: ${{ github.event.inputs.working_directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version_file: .terraform-version
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: |
          terraform plan -input=false -no-color \
            -var="project_name=${{ vars.TF_PROJECT_NAME }}" \
            -var="environment=${{ vars.TF_ENVIRONMENT }}" \
            -var="region=${{ vars.AWS_REGION }}" \
            -var="aws_account_id=${{ vars.AWS_ACCOUNT_ID }}"
